{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Django Public Blog - авторизация</title>
    <link rel="stylesheet" href="{% static 'css/article.css' %}">
</head>
<body>
    <div class="content">
        <h1>Авторизация</h1>
        <form method="POST">{% csrf_token %}
            <input type="text" name="username" placeholder="Имя пользователя" value="{{ form.username }}">
            <input type="password" name="password" placeholder="Пароль">
            <input type="submit" value="Войти">
        </form>
        <div class="form-errors">{{ form.errors }}</div>
        <p class="auth-link">Нет аккаунта? <a href="/register/">Зарегистрироваться</a></p>
    </div>
</body>
</html>
